// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Gradle plugin for Google Services
        classpath 'com.android.tools.build:gradle:8.1.1' // Latest stable version
        classpath 'com.google.gms:google-services:4.4.2' // Use the latest version
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Set build directories for root and subprojects
rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

// Clean task
tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
