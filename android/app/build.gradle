plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.example.openmind_flutter"
    compileSdk = flutter.compileSdkVersion // Ensure this matches your Flutter compileSdkVersion
    ndkVersion = "27.2.14633176" // Latest NDK version

    compileOptions {
        // Enable support for new language APIs
        coreLibraryDesugaringEnabled true
        // Set Java compatibility to Java 17
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17" // Ensure Kotlin uses Java 17
    }

    defaultConfig {
        applicationId = "com.example.openmind_flutter"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            //added to include the razorpay classes
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // Use debug signing for now, adjust for production builds
            signingConfig = signingConfigs.debug
        }
    }
}

dependencies {
    // Import the Firebase BoM (Bill of Materials)
    implementation platform('com.google.firebase:firebase-bom:33.7.0') // Latest version
    implementation 'com.google.firebase:firebase-messaging' // Add Firebase Cloud Messaging dependency

    // Add desugaring support for Java 17 features
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3' // Latest version

    // Other dependencies can be added here
}

flutter {
    source = "../.."
}
